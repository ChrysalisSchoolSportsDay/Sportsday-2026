<script>
    const SPREADSHEET_ID = 'YOUR_SPREADSHEET_ID';
    const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL';
    const SHEET_NAME = 'Sheet1'; 

    let activeID = "";

    async function fetchStudent() {
        const input = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!input) return;

        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
        
        try {
            const response = await fetch(url);
            const text = await response.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const rows = json.table.rows;

            // QUADRUPLE SEARCH LOGIC: Check Col A, B, C, or D
            const student = rows.find(r => 
                (r.c[0] && r.c[0].v.toString().toLowerCase() === input) || // Roll No (A)
                (r.c[1] && r.c[1].v.toString().toLowerCase() === input) || // Name (B)
                (r.c[2] && r.c[2].v.toString().toLowerCase() === input) || // Phone 1 (C)
                (r.c[3] && r.c[3].v.toString().toLowerCase() === input)    // Phone 2 (D)
            );

            if (student) {
                activeID = student.c[0].v;
                document.getElementById('resID').innerText = activeID;
                document.getElementById('resName').innerText = student.c[1].v;
                
                // UPDATED INDEXES (A=0, B=1, C=2, D=3, E=4, F=5, G=6, H=7, I=8)
                document.getElementById('resRow').innerText = student.c[4] ? student.c[4].v : "-";
                document.getElementById('resSeat').innerText = student.c[5] ? student.c[5].v : "-";
                
                // Status (Col G / Index 6)
                const status = student.c[6] ? student.c[6].v : "Not Checked In";
                document.getElementById('resStatus').innerText = status;
                document.getElementById('resStatus').style.color = status.includes("Arrived") ? "#28a745" : "#d93025";

                // Zone (Col H / Index 7) and Directions (Col I / Index 8)
                document.getElementById('resZone').innerText = student.c[7] ? student.c[7].v : "General";
                document.getElementById('resDirections').innerText = student.c[8] ? student.c[8].v : "";

                document.getElementById('result').style.display = 'block';
                document.getElementById('checkInBtn').style.display = status.includes("Arrived") ? 'none' : 'block';
            } else {
                alert("No record found. Please check the ID, Name, or Phone Number.");
            }
        } catch (e) { alert("Error loading data. Check your Spreadsheet ID."); }
    }

    async function doCheckIn() {
        const btn = document.getElementById('checkInBtn');
        btn.innerText = "Checking in...";
        btn.disabled = true;

        try {
            // Sends the unique ID to the script
            await fetch(`${APPS_SCRIPT_URL}?id=${activeID}`, { mode: 'no-cors' });
            document.getElementById('resStatus').innerText = "Arrived (Success)";
            document.getElementById('resStatus').style.color = "#28a745";
            btn.style.display = 'none';
        } catch (e) { alert("Check-in failed."); btn.disabled = false; }
    }
</script>
