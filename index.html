<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Day Check-In</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-search { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-checkin { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        #result { display: none; margin-top: 25px; padding: 20px; border-radius: 10px; background: #e8f0fe; }
        .info-label { color: #5f6368; font-size: 0.9rem; margin-bottom: 5px; }
        .info-value { font-size: 1.4rem; font-weight: bold; color: #202124; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏆 Sports Day Entry</h2>
    <input type="text" id="studentSearch" placeholder="Enter Student Name...">
    <button class="btn-search" onclick="fetchFromSheet()">Find Seating</button>

    <div id="result">
        <div class="info-label">STUDENT</div>
        <div class="info-value" id="resName"></div>
        
        <div style="display: flex; justify-content: space-around;">
            <div>
                <div class="info-label">ROW</div>
                <div class="info-value" id="resRow"></div>
            </div>
            <div>
                <div class="info-label">SEAT</div>
                <div class="info-value" id="resSeat"></div>
            </div>
        </div>

        <button id="checkInBtn" class="btn-checkin" onclick="doCheckIn()">Confirm Arrival / Check-In</button>
        <p id="statusMsg" style="margin-top:10px; font-weight:bold; color:#28a745;"></p>
    </div>
</div>

<script>
    const SPREADSHEET_ID = '1t-z1_e6MQJDrIVG1Ooq3RAUeoFvxjIxPKtcbAWkjNNo'; // Replace this
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzox1P3n6NnotVCm9fFgs4UZYwg6IcbeQypJhRwEnSPjNeCYh2aF6d169FAqJPVa6Rs/exec'; // Replace with URL from Step 1
    
    let currentStudent = "";

    async function fetchFromSheet() {
        const query = document.getElementById('studentSearch').value.trim().toLowerCase();
        if (!query) return;

        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;
        
        try {
            const response = await fetch(url);
            const text = await response.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const student = json.table.rows.find(r => r.c[0].v.toLowerCase() === query);

            if (student) {
                currentStudent = student.c[0].v;
                document.getElementById('resName').innerText = currentStudent;
                document.getElementById('resRow').innerText = student.c[1].v;
                document.getElementById('resSeat').innerText = student.c[2].v;
                document.getElementById('result').style.display = 'block';
                document.getElementById('statusMsg').innerText = "";
                document.getElementById('checkInBtn').disabled = false;
                document.getElementById('checkInBtn').innerText = "Confirm Arrival / Check-In";
            } else {
                alert("Name not found.");
            }
        } catch (e) { alert("Error loading data."); }
    }

    async function doCheckIn() {
        const btn = document.getElementById('checkInBtn');
        btn.innerText = "Checking in...";
        btn.disabled = true;

        try {
            await fetch(`${APPS_SCRIPT_URL}?name=${encodeURIComponent(currentStudent)}`, { mode: 'no-cors' });
            document.getElementById('statusMsg').innerText = "✓ Checked In Successfully!";
            btn.style.display = 'none';
        } catch (e) {
            alert("Check-in failed. Please tell a staff member.");
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
